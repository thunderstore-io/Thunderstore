name: Thunderstore App - Released
on:
  release:
    types: [released]
jobs:
  trigger-release-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Release Workflow
        env:
          GH_TOKEN: ${{ secrets.INFRA_DISPATCH_TOKEN }}
        run: |
          gh workflow run build-thunderstore-app-release.yml \
          --repo ${{ vars.INFRA_REPO }} \
          --ref master \
          -f tag_name='${{ github.event.release.tag_name }}'
