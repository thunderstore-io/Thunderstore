[uwsgi]
module = thunderstore.core.wsgi:application
wsgi-file = thunderstore/core/wsgi.py

; --- Process model ---
master = true
enable-threads = true
workers = 2
threads = 4
; Serialise accept() across workers to avoid thundering herd
thunder-lock = true
; Only one Python sub-interpreter per worker (avoids C-extension issues)
single-interpreter = true
; Fail hard if the WSGI app cannot be loaded
need-app = true

; --- Worker recycling ---
; Respawn a worker after serving this many requests (prevents slow memory leaks)
max-requests = 5000
; Respawn a worker after this many seconds of lifetime
max-worker-lifetime = 3600
; Respawn a worker when its RSS exceeds this value in MB.
; Set well below the 2Gi container limit to avoid OOM kills:
; 2 workers × 768 MB + ~200 MB master ≈ 1.7 GB, leaving ~300 MB headroom.
reload-on-rss = 768
; Grace period (seconds) for a worker to finish requests before being killed
worker-reload-mercy = 60

; --- Networking ---
http-socket = 0.0.0.0:8000
socket-timeout = 60
; Backlog queue size for pending connections. Larger value gives HPA more
; time to scale up before connections get refused during traffic spikes.
listen = 256

; --- Lifecycle ---
pidfile = %(UWSGI_PIDFILE)
; Remove pidfile and sockets on shutdown
vacuum = true
; Translate SIGTERM into graceful shutdown (required for Kubernetes pod termination)
die-on-term = true

; --- Logging ---
disable-logging = false
log-4xx = true
log-5xx = true
log-slow = true
; Threshold in milliseconds for slow request logging
log-slow-time = 3000

; --- Metrics (scraped by uwsgi-exporter sidecar → Prometheus) ---
stats = :9191
stats-http = true
memory-report = true

; --- Request handling ---
; Buffer the full request body before passing to the app (prevents worker
; starvation from slow-uploading clients). Threshold in bytes.
post-buffering = 8192
; Max size for request headers in bytes
buffer-size = 65536
; Kill a worker if a single request takes longer than this many seconds
harakiri = 60
harakiri-verbose = true
