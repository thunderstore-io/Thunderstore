# Local development reverse proxy. nginx is the single entry point on :80.
#
#   thunderstore.localhost      -> cyberstorm-remix (the new main site), which runs
#                                  natively on the host. Django serves the API and
#                                  the other backend paths on the SAME origin.
#   old.thunderstore.localhost  -> the legacy Django-rendered site, mirroring the
#                                  production `old.` domain.
#
# Running the Remix dev server on the host (instead of in a container) means both
# its SSR fetches and the browser resolve `thunderstore.localhost` to this nginx,
# so they share a single API origin and no /etc/hosts trickery is required.

proxy_cache_path /usr/share/nginx/cache levels=1:2 keys_zone=test_cache:10m max_size=1g
                 inactive=20s use_temp_path=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# The Remix dev server, running natively on the host.
upstream remix_host {
    server host.docker.internal:3000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# Legacy site: proxy everything to Django.
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name old.thunderstore.localhost;

    location / {
        proxy_cache test_cache;
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header X-Cache-Status $upstream_cache_status;
    }
}

# ---------------------------------------------------------------------------
# Auth host: when AUTH_EXCLUSIVE_HOST is configured (see README, e.g.
# auth.thunderstore.localhost) the social-auth flow is served here. Everything
# is proxied to Django, which restricts this host to /auth/ paths via
# CommunitySiteMiddleware and redirects anything else to the primary host.
# Auth responses must never be cached, so no proxy_cache is set.
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name auth.thunderstore.localhost;

    location / {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# Main site: the Remix app, with Django API/infra on the same origin.
# Marked default_server so any unknown host also lands on the new site.
# ---------------------------------------------------------------------------
server {
    listen 80 default_server;
    server_name thunderstore.localhost;

    # Shared proxy headers, inherited by any location that doesn't set its own.
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- Django-owned infrastructure paths --------------------------------
    # These reach Django so the Remix SSR loaders and the browser can both call
    # the API (and use auth / admin / media / static) on this single origin.
    location /api/             { proxy_pass http://django:8000; }
    location /auth/            { proxy_pass http://django:8000; }
    location /logout/          { proxy_pass http://django:8000; }
    location /djangoadmin/     { proxy_pass http://django:8000; }
    location /healthcheck/     { proxy_pass http://django:8000; }
    location /media/           { proxy_pass http://django:8000; }
    location /static/          { proxy_pass http://django:8000; }
    location /thumbnail-serve/ { proxy_pass http://django:8000; }
    location /__debug__/       { proxy_pass http://django:8000; }
    location = /favicon.ico    { proxy_pass http://django:8000; }
    location = /robots.txt     { proxy_pass http://django:8000; }

    # Legacy per-community API consumed by the mod managers, e.g.
    # /c/<community>/api/v1/package-listing-index/. The /c/ PAGE routes still
    # fall through to Remix via the catch-all location below.
    location ~ ^/c/[^/]+/api/  { proxy_pass http://django:8000; }

    # --- Everything else -> the Remix dev server on the host --------------
    location / {
        proxy_pass http://remix_host;
        # Defining any proxy_set_header here disables inheritance of the
        # server-level ones, so the forwarding headers must be repeated.
        # Without an explicit Host, nginx would send the upstream name
        # ("remix_host") as Host, which the Vite dev server rejects.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # The dev server output must never be cached.
        proxy_cache off;

        # When the dev server is not running yet, nginx generates a 502/504 on
        # the failed/timed-out upstream connection. Intercept those to show an
        # actionable hint instead of a bare gateway error. No
        # proxy_intercept_errors is set, so genuine dev-server responses (incl.
        # its own 5xx) are never replaced.
        error_page 502 504 = @remix_down;
    }

    # Hint page shown when the Remix dev server on the host is unreachable.
    location @remix_down {
        default_type text/html;
        return 503 '<!doctype html>
<meta charset="utf-8">
<title>Frontend dev server not running</title>
<body style="font-family:sans-serif;max-width:40rem;margin:4rem auto;line-height:1.5">
<h1>Frontend dev server not running</h1>
<p>nginx could not reach the Cyberstorm Remix dev server on <code>host.docker.internal:3000</code>.</p>
<p>Start it from the <code>thunderstore-ui</code> repo:</p>
<pre>cd thunderstore-ui
pnpm dev</pre>
<p>Or run the built version from the <code>apps/cyberstorm-remix</code> folder:</p>
<pre>cd thunderstore-ui/apps/cyberstorm-remix
pnpm build
pnpm start:local</pre>
<p>Then reload this page. The legacy Django site is available at <a href="http://old.thunderstore.localhost">old.thunderstore.localhost</a>.</p>
</body>';
    }
}
